services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: digitize
      POSTGRES_USER: digitize
      POSTGRES_PASSWORD: replace-secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitize -d digitize"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    env_file:
      - ${BACKEND_ENV_FILE:-backend/.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_data:/data
    command: ["alembic", "upgrade", "head"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-backend/.env.production}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: replace-access-key
      MINIO_ROOT_PASSWORD: replace-secret-key
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  backend_data:
  minio_data:
